{% for banner in banners %}
<div class="widget-item widget-item2">
    <div class="col-md-12">
        <div class="category-item">
            <div class="thumb">
                <a href="{% if banner.link %}{{ banner.link }}{% else %}#{% endif %}">
                    <img class="w-100" src="{{ banner.image.url }}" alt="{{ banner.title }}">
                </a>
            </div>
        </div>
    </div>
</div>
{% endfor %}
